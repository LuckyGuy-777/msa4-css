<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="01.css">
  <title>01_styleSheet</title>

  <!-- 내부스타일. head 태그 안에 스타일을 줌. -->
  <style>
    h2{
      color: blue;
    }
  </style>

</head>
<body>
  <!-- 인라인 스타일 : HTML요소에 'style속성' 을 통해 직접 스타일 적용 -->
  <h1 style="color: yellowgreen">안녕 CSS</h1>


  <h2>내부스타일</h2>


  <!-- 외부 스타일 : 별도의 css파일을 작성하고, head 태그의,
     link태그를 사용해서, 스타일을 적용하는 방식 -->
  <h3>외부 스타일</h3>
</body>
</html>
