<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="14.css">
    <title>Document</title>
</head>
<body>
    
    <fieldset style="width: 450px">
        <legend class="form_title"><h1>I want YOU!</h1></legend>
        <form action="">
            <label for="name" class="star">이름</label>
            <input type="text" name="name" id="name">
            <br><br>
            <label for="age" class="star">나이</label>
            <input type="number" name="age" id="age" min="20" required>
            <br><br>
            <label for="gender" class="star">성별</label>
            <input type="radio" name="gender" id="man" required>
            <label for="man">남자</label>
            <input type="radio" name="gender" id="women" required>
            <label for="women">여자</label>
            <br>
            <br>
            <label for="request">요청사항</label>
            <textarea name="request" id="rq1" placeholder="요청 사항 입력" rows="10" ></textarea>
            <br>

            <button type="submit">보내기</button>
        </form>


    </fieldset>
</body>
</html>
