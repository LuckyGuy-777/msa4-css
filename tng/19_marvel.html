  <link rel="stylesheet" href="./19_marvel.css">
  <title>Marvel</title>
</head>
<body>
  <div class="container">
    <!-- 사이드바 -->
    <div class="side-bar">
      <div class="side-inner">
        <h1 class="title">영화관이여</h1>

        <!-- 네비게이션 -->
        <div class="nav-box">
          <div class="nav">
            <p class="nav-title">메뉴 01</p>
            <ul class="nav-list">
              <li><a href="">영화 소개</a></li>
              <li><a href="">영화 시간표</a></li>
              <li><a href="">주전부리</a></li>
              <li><a href="">기타</a></li>
            </ul>
          </div>
          <div class="nav">
            <p class="nav-title">메뉴 01</p>
            <ul class="nav-list">
              <li><a href="">영화 소개</a></li>
              <li><a href="">영화 시간표</a></li>
              <li><a href="">주전부리</a></li>
              <li><a href="">기타</a></li>
            </ul>
          </div>
        </div>
      </div>
    </div>

    <!-- 메인 -->
    <div class="main">
      <!-- 검색바 -->
      <form action="">
        <div class="main-search-box">
          <input type="text" class="input-w-80p">
          <button type="submit" class="btn">S</button>
        </div>
      </form>

      <!-- 베너 -->
       <div class="main-banner">
        <h2 class="sub-title">영화</h2>
       </div>


      <!-- 콘텐츠 -->
      <div class="main-contents-box">
        <div class="card">
          <!-- 인라인스타일 형식으로, 이미지 주어짐. -->
          <div class="card-img" style="background-image: url('../img/ant_man_and_the_wasp_2018_large_cover.jpg');"></div>
          <p class="card-title">엔트맨 The WASP</p>
          <p class="card-info">2019</p>
        </div>

        <div class="card">
          <div class="card-img" style="background-image: url('../img/black_panther_2018_large_cover.jpg');"></div>
          <p class="card-title">블랙팬서</p>
          <p class="card-info">2019</p>
        </div>

        
        <div class="card">
          <div class="card-img" style="background-image: url('../img/avengers_end_game_large_cover.jpg');"></div>
          <p class="card-title">엔드게임</p>
          <p class="card-info">2019</p>
        </div>

        
        <div class="card">
          <div class="card-img" style="background-image: url('../img/captain_marvel_2019_large_cover.jpg');"></div>
          <p class="card-title">캡틴마블</p>
          <p class="card-info">2019</p>
        </div>

        
        <div class="card">
          <div class="card-img" style="background-image: url('../img/thor_ragnarok_2017_large_cover.jpg');"></div>
          <p class="card-title">토르 라그나로크</p>
          <p class="card-info">2019</p>
        </div>

        
        <div class="card">
          <div class="card-img" style="background-image: url('../img/avengers_infinity_war_2018_large_cover.jpg');"></div>
          <p class="card-title">인피니티 워</p>
          <p class="card-info">2019</p>
        </div>

      </div>
    </div>
  </div>


  <!-- TOP 버튼 -->
  <!-- <button type="button">TOP
    
    <a href=""> 

  </button> -->

  <!-- href=# 은 무슨의미 : #은 이름으로 인식한다. -->
   <!-- #banner, #top 등.. 내가원하는 위치까지 올라가게끔할수 있다. -->
  <!-- #은, 페이지의 최상단 으로 감 -->
  <a href="#" class="btn btn-large btn-top">TOP</a>

</html>
